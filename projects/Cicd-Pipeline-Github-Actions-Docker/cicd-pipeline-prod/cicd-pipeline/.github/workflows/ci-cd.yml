# ─────────────────────────────────────────────────────────────────
#  GitHub Actions — Production CI/CD Pipeline
#
#  Triggers : push / PR to main or develop
#  Jobs     : 1. lint  2. test  3. build-push  4. security-scan  5. notify
# ─────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

# Cancel in-flight runs on the same branch when new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY:    docker.io
  IMAGE_NAME:  ${{ secrets.DOCKERHUB_USERNAME }}/cicd-flask-app
  PYTHON_VER:  "3.11"

# ─────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1 : Lint ────────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Style Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VER }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run flake8 (PEP8 style)
        run: |
          flake8 app/ \
            --max-line-length=100 \
            --exclude=app/tests/__init__.py,app/__init__.py \
            --statistics

      - name: Check formatting with black
        run: |
          black --check --line-length 100 app/

  # ── Job 2 : Test ────────────────────────────────────────────────
  test:
    name: "✅ Unit Tests & Coverage"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VER }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: pip

      - name: Install application dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run pytest with coverage
        run: |
          pytest app/tests/ \
            --tb=short \
            --verbose \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── Job 3 : Build & Push ────────────────────────────────────────
  build-and-push:
    name: "🐳 Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: test
    # Only push on pushes to main/tags, not on PRs
    if: github.event_name == 'push'

    outputs:
      image-tag:    ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Output image info
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ── Job 4 : Security Scan ───────────────────────────────────────
  security-scan:
    name: "🔒 Security Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      - name: Pull image for scanning
        run: docker pull ${{ env.IMAGE_NAME }}:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    "${{ env.IMAGE_NAME }}:latest"
          format:       "table"
          exit-code:    "0"           # set to "1" to fail on HIGH/CRITICAL
          severity:     "HIGH,CRITICAL"
          ignore-unfixed: true

  # ── Job 5 : Notify ──────────────────────────────────────────────
  notify:
    name: "📢 Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [lint, test, build-and-push]
    if: always()

    steps:
      - name: Pipeline result summary
        run: |
          echo "## CI/CD Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint       | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test       | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build/Push | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:**  \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deploy Command" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "kubectl rollout restart deployment/cicd-flask-app" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
