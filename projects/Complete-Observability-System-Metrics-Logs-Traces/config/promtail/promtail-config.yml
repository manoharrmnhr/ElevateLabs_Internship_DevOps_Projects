server:
  http_listen_port: 9080
  grpc_listen_port: 0

clients:
  - url: http://loki:3100/loki/api/v1/push

positions:
  filename: /tmp/positions.yaml

scrape_configs:
  # Docker container logs
  - job_name: docker
    docker:
      host: unix:///var/run/docker.sock
      labels:
        container_name: "{{ .Container.Name }}"
        image_name: "{{ .Container.Config.Image }}"
        service: "{{ index .Container.Config.Labels \"com.docker.compose.service\" }}"
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: levelname
            message: message
            function: funcName
            line: lineno
      - timestamp:
          source: timestamp
          format: 'UnixDate'
      - labels:
          level:
          function:
          service:

  # Host logs (syslog)
  - job_name: syslog
    syslog:
      listen_address: 0.0.0.0:514
      protocol_config:
        protocol: rfc5424
    relabel_configs:
      - source_labels: ['__syslog_message_hostname']
        target_label: 'hostname'
    pipeline_stages:
      - regex:
          expression: '(?P<level>ERROR|WARN|INFO|DEBUG)'
      - labels:
          level:

# Tracing configuration (OTEL)
traces:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  processors:
    memory_limiter:
      check_interval: 1s
      limit_mib: 512
    batch:
      send_batch_size: 100
  exporters:
    otlp:
      endpoint: jaeger:4317
      tls:
        insecure: true
  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlp]
