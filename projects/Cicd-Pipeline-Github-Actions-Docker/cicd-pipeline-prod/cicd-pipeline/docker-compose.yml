version: "3.9"

# ─────────────────────────────────────────────────────────────────
#  Docker Compose — Local Development & Integration Testing
# ─────────────────────────────────────────────────────────────────

services:

  # ── Flask Application ────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: cicd-flask-app
    image: cicd-flask-app:local
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - APP_VERSION=1.0.0
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    labels:
      - "project=cicd-pipeline-demo"
      - "maintainer=your-github-username"

  # ── Nginx Reverse Proxy (Optional) ──────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cicd-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    profiles:
      - with-nginx   # only starts with: docker-compose --profile with-nginx up

networks:
  app-network:
    driver: bridge
    name: cicd-network
