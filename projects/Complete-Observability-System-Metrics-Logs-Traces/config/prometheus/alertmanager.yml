global:
  resolve_timeout: 5m
  slack_api_url: ''  # Configure Slack webhook URL if needed

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
    - match:
        severity: warning
      receiver: 'warning'

receivers:
  - name: 'default'
    # Default receiver configuration
    # Can be configured with email, webhook, PagerDuty, etc.

  - name: 'critical'
    # Critical alerts configuration
    # Typically sent to PagerDuty, SMS, or critical notification channels

  - name: 'warning'
    # Warning alerts configuration
    # Can be sent to email or Slack

inhibit_rules:
  # Suppress warning alerts if critical alert is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
