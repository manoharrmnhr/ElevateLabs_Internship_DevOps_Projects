---
# ═══════════════════════════════════════════════════════════════
# VirtualService — EMERGENCY ROLLBACK (100% stable)
# Apply immediately when canary breaches any SLO:
#   - error rate  > 5%
#   - p95 latency > 500ms
#   - pod restarts > 2 in 5 min
#
# kubectl apply -f 06-vs-rollback.yaml
# ═══════════════════════════════════════════════════════════════
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: demo-app-vs
  namespace: canary-demo
  annotations:
    traffic.canary/stable-weight: "100"
    traffic.canary/canary-weight: "0"
    traffic.canary/phase:         "rolled-back"
spec:
  hosts:
  - "demo-app.local"
  - demo-app
  gateways:
  - demo-app-gateway
  - mesh
  http:
  - name: full-stable
    route:
    - destination:
        host:   demo-app
        subset: stable
      weight: 100
    timeout: 10s
    retries:
      attempts: 3
      perTryTimeout: 3s
      retryOn: "gateway-error,connect-failure,5xx"
