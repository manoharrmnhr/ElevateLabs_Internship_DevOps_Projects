groups:
  - name: app_alerts
    interval: 30s
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: (rate(app_errors_total[5m]) > 0.1)
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} (threshold: 0.1)"

      # High response time alert
      - alert: HighResponseTime
        expr: (histogram_quantile(0.95, rate(app_request_duration_seconds_bucket[5m])) > 1.0)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "P95 response time is {{ $value }}s"

      # High number of active requests
      - alert: HighActiveRequests
        expr: (app_active_requests > 50)
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High number of active requests"
          description: "Active requests: {{ $value }}"

      # Service down alert
      - alert: ServiceDown
        expr: up{job="observability-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "observability-app service is not responding"

      # High CPU usage (simulated via request rate)
      - alert: HighRequestVolume
        expr: (rate(app_requests_total[5m]) > 10)
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High request volume"
          description: "Request rate is {{ $value }} req/s"
