name: Canary Deployment Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'k8s/**'
      - 'istio/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      canary_weight:
        description: 'Initial canary traffic weight (%)'
        required: true
        default: '20'

env:
  REGISTRY:       ghcr.io
  IMAGE_NAME:     ${{ github.repository }}/demo-app
  NAMESPACE:      canary-demo

jobs:
  # ── Job 1: Build & test ──────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix=
          type=ref,event=branch
          type=semver,pattern={{version}}

    - name: Build and push stable image (v1)
      uses: docker/build-push-action@v5
      with:
        context:   ./app/v1
        push:      ${{ github.event_name != 'pull_request' }}
        tags:      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable-${{ steps.meta.outputs.version }}
        cache-from: type=gha
        cache-to:   type=gha,mode=max

    - name: Build and push canary image (v2)
      uses: docker/build-push-action@v5
      with:
        context:   ./app/v2
        push:      ${{ github.event_name != 'pull_request' }}
        tags:      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:canary-${{ steps.meta.outputs.version }}
        cache-from: type=gha
        cache-to:   type=gha,mode=max

  # ── Job 2: Validate K8s manifests ──────────────────────────────────────────
  validate:
    name: Validate Manifests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install kubeval
      run: |
        wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
        tar xf kubeval-linux-amd64.tar.gz
        sudo mv kubeval /usr/local/bin/

    - name: Validate K8s manifests
      run: |
        kubeval --strict k8s/*.yaml || true

    - name: Lint Helm chart
      run: |
        helm lint helm/canary-app/

  # ── Job 3: Deploy canary ───────────────────────────────────────────────────
  deploy-canary:
    name: Deploy Canary
    runs-on: ubuntu-latest
    needs: [build, validate]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
    - uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/k8s-set-context@v3
      with:
        method:     kubeconfig
        kubeconfig: ${{ secrets.KUBECONFIG }}

    - name: Deploy with Helm
      run: |
        helm upgrade --install canary-app ./helm/canary-app \
          --namespace ${{ env.NAMESPACE }} \
          --create-namespace \
          --set canary.tag=canary-${{ needs.build.outputs.image-tag }} \
          --set traffic.canaryWeight=${{ github.event.inputs.canary_weight || '20' }} \
          --set traffic.stableWeight=${{ 100 - (github.event.inputs.canary_weight || 20) }} \
          --wait --timeout 5m

    - name: Verify deployment
      run: |
        kubectl rollout status deployment/app-canary -n ${{ env.NAMESPACE }} --timeout=120s
        kubectl get pods -n ${{ env.NAMESPACE }}
