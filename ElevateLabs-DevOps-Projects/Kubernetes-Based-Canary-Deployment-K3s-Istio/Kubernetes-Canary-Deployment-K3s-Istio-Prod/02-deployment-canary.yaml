---
# ═══════════════════════════════════════════════════════════════
# Deployment — app-canary  (v2.0.0)
# Start with 1 replica (receives ~20% traffic via Istio weight).
# Scale up ONLY after metrics confirm stability.
# ═══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-canary
  namespace: canary-demo
  labels:
    app:     demo-app
    version: v2.0.0
    track:   canary
    app.kubernetes.io/name:      demo-app
    app.kubernetes.io/version:   v2.0.0
    app.kubernetes.io/component: backend
  annotations:
    deployment.kubernetes.io/canary: "true"
    canary.started-at: "2026-02-23T00:00:00Z"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app:   demo-app
      track: canary
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app:     demo-app
        version: v2.0.0
        track:   canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3000"
        prometheus.io/path:   "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name:  app
        image: demo-app:v2.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name:          http
          containerPort: 3000
          protocol:      TCP
        env:
        - name:  APP_VERSION
          value: "v2.0.0"
        - name:  BUILD_ID
          value: "canary-001"
        - name:  TRACK
          value: "canary"
        - name:  PORT
          value: "3000"
        - name:  FAULT_RATE
          value: "0.03"          # 3% fault injection for chaos testing
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          requests:
            cpu:    "50m"
            memory: "64Mi"
          limits:
            cpu:    "250m"
            memory: "128Mi"
        startupProbe:
          httpGet:
            path: /healthz
            port: 3000
          failureThreshold: 6
          periodSeconds:    5
        readinessProbe:
          httpGet:
            path: /readyz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds:       10
          failureThreshold:    3
          successThreshold:    1
          timeoutSeconds:      2
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 15
          periodSeconds:       20
          failureThreshold:    3
          timeoutSeconds:      3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]
        securityContext:
          runAsNonRoot:             true
          runAsUser:                1001
          readOnlyRootFilesystem:   true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      securityContext:
        fsGroup: 1001
---
# ── PodDisruptionBudget: canary must always have 1 pod ──────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: app-canary-pdb
  namespace: canary-demo
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app:   demo-app
      track: canary
