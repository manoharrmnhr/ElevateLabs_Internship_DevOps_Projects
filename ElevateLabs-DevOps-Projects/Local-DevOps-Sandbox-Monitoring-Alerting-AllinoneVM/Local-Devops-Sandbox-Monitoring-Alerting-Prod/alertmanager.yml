# =============================================================================
# Alertmanager Configuration – DevOps Monitoring Sandbox
# =============================================================================
global:
  # SMTP settings (update with real values for email notifications)
  smtp_smarthost:   'smtp.gmail.com:587'
  smtp_from:        'alertmanager@sandbox.local'
  smtp_auth_username: 'your-email@gmail.com'
  smtp_auth_password: 'your-app-password'
  smtp_require_tls: true

  # Slack (update webhook URL for Slack notifications)
  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

  # How long to wait before re-sending a resolved alert
  resolve_timeout: 5m

# =============================================================================
# Templates
# =============================================================================
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# =============================================================================
# Routing Tree
# =============================================================================
route:
  # Default receiver
  receiver: 'default-receiver'
  group_by: ['alertname', 'instance', 'category']
  group_wait:      30s    # Wait to batch alerts together
  group_interval:  5m     # How long to wait before sending new alerts in a group
  repeat_interval: 4h     # Resend after this duration if still firing

  routes:
    # --- Critical alerts → immediate notification ---
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # --- Warning alerts → standard notification ---
    - match:
        severity: warning
      receiver: 'warning-receiver'
      group_wait: 1m
      repeat_interval: 6h

    # --- CPU alerts ---
    - match:
        category: cpu
      receiver: 'cpu-receiver'

    # --- Disk alerts ---
    - match:
        category: disk
      receiver: 'disk-receiver'

    # --- Service availability ---
    - match:
        category: availability
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 30m

# =============================================================================
# Inhibition Rules (suppress lower severity if higher is firing)
# =============================================================================
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# =============================================================================
# Receivers
# =============================================================================
receivers:
  # --- Default (webhook / log only for sandbox) ---
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://localhost:5001/webhook'  # Optional local webhook listener
        send_resolved: true
        http_config:
          tls_config:
            insecure_skip_verify: true

  # --- Critical ---
  - name: 'critical-receiver'
    # Email example (uncomment and configure):
    # email_configs:
    #   - to: 'oncall@yourcompany.com'
    #     subject: '[CRITICAL] {{ .GroupLabels.alertname }} on {{ .GroupLabels.instance }}'
    #     send_resolved: true
    #
    # Slack example (uncomment and configure):
    # slack_configs:
    #   - channel: '#alerts-critical'
    #     title: ':red_circle: CRITICAL Alert'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    #     send_resolved: true
    webhook_configs:
      - url: 'http://localhost:5001/webhook/critical'
        send_resolved: true

  # --- Warning ---
  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://localhost:5001/webhook/warning'
        send_resolved: true

  # --- CPU Specific ---
  - name: 'cpu-receiver'
    webhook_configs:
      - url: 'http://localhost:5001/webhook/cpu'
        send_resolved: true

  # --- Disk Specific ---
  - name: 'disk-receiver'
    webhook_configs:
      - url: 'http://localhost:5001/webhook/disk'
        send_resolved: true
