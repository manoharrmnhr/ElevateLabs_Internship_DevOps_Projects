# =============================================================================
# Prometheus Alert Rules – DevOps Monitoring Sandbox
# Covers: CPU, Memory, Disk, Services, Network
# =============================================================================
groups:

  # ---------------------------------------------------------------------------
  # CPU Alerts
  # ---------------------------------------------------------------------------
  - name: cpu_alerts
    rules:
      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
          category: cpu
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% (threshold: 80%) for more than 2 minutes."
          runbook: "Check top processes: `ps aux --sort=-%cpu | head -15`"

      - alert: CriticalCPUUsage
        expr: |
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 1m
        labels:
          severity: critical
          category: cpu
        annotations:
          summary: "CRITICAL CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% (threshold: 95%) – immediate action required."

  # ---------------------------------------------------------------------------
  # Memory Alerts
  # ---------------------------------------------------------------------------
  - name: memory_alerts
    rules:
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 2m
        labels:
          severity: warning
          category: memory
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | printf \"%.1f\" }}% (threshold: 80%)."

      - alert: CriticalMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 1m
        labels:
          severity: critical
          category: memory
        annotations:
          summary: "CRITICAL memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | printf \"%.1f\" }}% – system may become unresponsive."

  # ---------------------------------------------------------------------------
  # Disk Alerts
  # ---------------------------------------------------------------------------
  - name: disk_alerts
    rules:
      - alert: DiskSpaceWarning
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} /
                node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"})) * 100 > 75
        for: 5m
        labels:
          severity: warning
          category: disk
        annotations:
          summary: "Disk space warning on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Disk usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.mountpoint }}."

      - alert: DiskSpaceCritical
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} /
                node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"})) * 100 > 90
        for: 2m
        labels:
          severity: critical
          category: disk
        annotations:
          summary: "CRITICAL disk space on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Disk usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.mountpoint }} – disk almost full!"

      - alert: DiskIOHigh
        expr: |
          rate(node_disk_io_time_seconds_total[5m]) > 0.9
        for: 5m
        labels:
          severity: warning
          category: disk
        annotations:
          summary: "High disk I/O on {{ $labels.instance }}"
          description: "Disk {{ $labels.device }} I/O utilization is above 90%."

  # ---------------------------------------------------------------------------
  # Service / Process Health Alerts
  # ---------------------------------------------------------------------------
  - name: service_health_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Service {{ $labels.job }} is DOWN on {{ $labels.instance }}"
          description: "The scrape target {{ $labels.instance }} (job: {{ $labels.job }}) has been unreachable for more than 1 minute."
          runbook: "Check service status: `systemctl status {{ $labels.job }}`"

      - alert: PrometheusTargetMissing
        expr: up == 0
        for: 5m
        labels:
          severity: warning
          category: availability
        annotations:
          summary: "Prometheus target missing: {{ $labels.instance }}"
          description: "Prometheus target {{ $labels.instance }} has been down for 5 minutes."

  # ---------------------------------------------------------------------------
  # Network Alerts
  # ---------------------------------------------------------------------------
  - name: network_alerts
    rules:
      - alert: HighNetworkReceive
        expr: |
          rate(node_network_receive_bytes_total{device!~"lo|docker.*|veth.*"}[5m]) / 1024 / 1024 > 100
        for: 5m
        labels:
          severity: warning
          category: network
        annotations:
          summary: "High network receive on {{ $labels.instance }} ({{ $labels.device }})"
          description: "Network receive rate is {{ $value | printf \"%.1f\" }} MB/s on {{ $labels.device }}."

      - alert: HighNetworkTransmit
        expr: |
          rate(node_network_transmit_bytes_total{device!~"lo|docker.*|veth.*"}[5m]) / 1024 / 1024 > 100
        for: 5m
        labels:
          severity: warning
          category: network
        annotations:
          summary: "High network transmit on {{ $labels.instance }} ({{ $labels.device }})"
          description: "Network transmit rate is {{ $value | printf \"%.1f\" }} MB/s on {{ $labels.device }}."

  # ---------------------------------------------------------------------------
  # System Load Alerts
  # ---------------------------------------------------------------------------
  - name: system_load_alerts
    rules:
      - alert: HighSystemLoad
        expr: |
          node_load1 > (count by(instance) (node_cpu_seconds_total{mode="idle"}) * 0.8)
        for: 5m
        labels:
          severity: warning
          category: load
        annotations:
          summary: "High system load on {{ $labels.instance }}"
          description: "1-minute load average is {{ $value | printf \"%.2f\" }}, exceeding 80% of CPU count."

      - alert: SystemLoadCritical
        expr: |
          node_load1 > (count by(instance) (node_cpu_seconds_total{mode="idle"}) * 1.5)
        for: 3m
        labels:
          severity: critical
          category: load
        annotations:
          summary: "CRITICAL system load on {{ $labels.instance }}"
          description: "1-minute load average is {{ $value | printf \"%.2f\" }}, exceeding 150% of CPU count."
