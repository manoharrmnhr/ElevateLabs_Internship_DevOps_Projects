# ─────────────────────────────────────────────────────────────────
#  Kubernetes Service — Exposes the Flask App
#  Type: NodePort (for local Minikube access)
#  Apply with: kubectl apply -f k8s/service.yml
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: cicd-flask-service
  namespace: default
  labels:
    app: cicd-flask-app
  annotations:
    description: "NodePort service for local Minikube access"
spec:
  type: NodePort
  selector:
    app: cicd-flask-app
  ports:
    - name: http
      protocol: TCP
      port: 80           # Service port (inside cluster)
      targetPort: 5000   # Container port
      nodePort: 30080    # External port on Minikube node (30000-32767)

---
# ─────────────────────────────────────────────────────────────────
#  Horizontal Pod Autoscaler (optional)
#  Scales between 2–5 replicas based on CPU usage
# ─────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cicd-flask-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cicd-flask-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
