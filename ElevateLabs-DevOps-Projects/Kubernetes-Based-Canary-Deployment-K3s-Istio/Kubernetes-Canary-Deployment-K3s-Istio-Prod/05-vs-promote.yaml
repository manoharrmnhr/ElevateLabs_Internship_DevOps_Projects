---
# ═══════════════════════════════════════════════════════════════
# VirtualService — Phase 3: FULL PROMOTION (100% canary)
# Apply ONLY after canary passes all SLO gates.
#
# After applying:
#   1. Update stable deployment image to v2.0.0
#   2. Scale canary deployment to 0
#   3. Rename / re-label stable pods to serve v2.0.0
#   4. Revert VS to stable subset (now running v2)
# ═══════════════════════════════════════════════════════════════
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: demo-app-vs
  namespace: canary-demo
  annotations:
    traffic.canary/stable-weight: "0"
    traffic.canary/canary-weight: "100"
    traffic.canary/phase:         "promoted"
spec:
  hosts:
  - "demo-app.local"
  - demo-app
  gateways:
  - demo-app-gateway
  - mesh
  http:
  - name: full-canary
    route:
    - destination:
        host:   demo-app
        subset: canary
      weight: 100
    timeout: 10s
    retries:
      attempts: 3
      perTryTimeout: 3s
      retryOn: "gateway-error,connect-failure,5xx"
