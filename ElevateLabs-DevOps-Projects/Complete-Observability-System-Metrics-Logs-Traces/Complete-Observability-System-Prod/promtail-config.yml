server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  # Docker container logs
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["logging=promtail"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels: ["__meta_docker_container_label_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_label_environment"]
        target_label: environment
    pipeline_stages:
      # Try to parse JSON logs
      - json:
          expressions:
            level: level
            timestamp: timestamp
            message: message
            trace_id: trace_id
            latency_ms: latency_ms
      - labels:
          level:
          trace_id:
      - timestamp:
          source: timestamp
          format: RFC3339
      - output:
          source: message

  # Sample app specific log parsing
  - job_name: sample-app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: sample-app
          service: sample-app
          environment: demo
          __path__: /var/log/sample-app/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: timestamp
            message: message
            method: method
            path: path
            status_code: status_code
            latency_ms: latency_ms
            trace_id: trace_id
      - labels:
          level:
          method:
          status_code:
          trace_id:
      - timestamp:
          source: timestamp
          format: RFC3339
