---
# ═══════════════════════════════════════════════════════════════
# Istio Gateway — demo-app-gateway
#
# Acts as the L7 load balancer entry point for the mesh.
# - Port 80  : HTTP (redirected to HTTPS in production)
# - Port 443 : HTTPS with TLS termination (cert from secret)
#
# For local K3s demo the TLS section is commented out.
# Uncomment and add your cert secret for production use.
# ═══════════════════════════════════════════════════════════════
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: demo-app-gateway
  namespace: canary-demo
  labels:
    app.kubernetes.io/part-of: canary-demo
spec:
  selector:
    istio: ingressgateway          # targets the default Istio ingress GW pod
  servers:
  # ── HTTP (port 80) ──────────────────────────────────────────
  - port:
      number:   80
      name:     http
      protocol: HTTP
    hosts:
    - "demo-app.local"
    - "canary.demo-app.local"
    # Uncomment below to force HTTPS redirect in production:
    # tls:
    #   httpsRedirect: true

  # ── HTTPS (port 443) — uncomment for production TLS ─────────
  # - port:
  #     number:   443
  #     name:     https
  #     protocol: HTTPS
  #   tls:
  #     mode:           SIMPLE
  #     credentialName: demo-app-tls   # kubectl create secret tls demo-app-tls ...
  #   hosts:
  #   - "demo-app.local"
