---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: demo-app-vs
  namespace: {{ .Values.namespace }}
  annotations:
    traffic.canary/stable-weight: {{ .Values.traffic.stableWeight | quote }}
    traffic.canary/canary-weight: {{ .Values.traffic.canaryWeight | quote }}
spec:
  hosts:
  - {{ .Values.istio.gateway.host | quote }}
  - demo-app
  gateways:
  - demo-app-gateway
  - mesh
  http:
  - name: canary-force
    match:
    - headers:
        x-canary:
          exact: "force"
    route:
    - destination:
        host:   demo-app
        subset: canary
      weight: 100
  - name: weight-split
    route:
    - destination:
        host:   demo-app
        subset: stable
      weight: {{ .Values.traffic.stableWeight }}
    - destination:
        host:   demo-app
        subset: canary
      weight: {{ .Values.traffic.canaryWeight }}
    timeout: 10s
    retries:
      attempts: 3
      perTryTimeout: 3s
      retryOn: "gateway-error,connect-failure,5xx"
