# ─────────────────────────────────────────────────────────────────
#  Kubernetes Deployment — CI/CD Flask App
#  Apply with: kubectl apply -f k8s/deployment.yml
# ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-flask-app
  namespace: default
  labels:
    app: cicd-flask-app
    version: "1.0.0"
    managed-by: kubectl
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "Production-grade Flask app deployed via CI/CD pipeline"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cicd-flask-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime rolling updates
  template:
    metadata:
      labels:
        app: cicd-flask-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "5000"
    spec:
      # Security context — run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser:    1000
        fsGroup:      1000

      containers:
        - name: flask-app
          # Replace YOUR_DOCKERHUB_USERNAME with your actual username
          image: YOUR_DOCKERHUB_USERNAME/cicd-flask-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP

          env:
            - name: FLASK_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: APP_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['version']

          # Liveness probe — restarts container if unhealthy
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe — removes from load balancer if not ready
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Resource limits — prevent noisy-neighbour issues
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

          # Container security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      # Graceful shutdown
      terminationGracePeriodSeconds: 30

      # Restart policy
      restartPolicy: Always
