---
# ═══════════════════════════════════════════════════════════════
# Namespace — canary-demo
# Istio sidecar injection is enabled at the namespace level so
# every pod automatically gets an Envoy proxy without any
# pod-level annotation.
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Namespace
metadata:
  name: canary-demo
  labels:
    istio-injection: enabled          # ← automatic Envoy sidecar
    app.kubernetes.io/managed-by: kubectl
    environment: production
  annotations:
    description: "Canary deployment demo namespace"
---
# ── ResourceQuota: cap total cluster resource consumption ───────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: canary-demo-quota
  namespace: canary-demo
spec:
  hard:
    requests.cpu:     "2"
    requests.memory:  "1Gi"
    limits.cpu:       "4"
    limits.memory:    "2Gi"
    pods:             "20"
    services:         "10"
---
# ── LimitRange: default container limits if not specified ───────
apiVersion: v1
kind: LimitRange
metadata:
  name: canary-demo-limits
  namespace: canary-demo
spec:
  limits:
  - type: Container
    default:
      cpu:    "200m"
      memory: "128Mi"
    defaultRequest:
      cpu:    "50m"
      memory: "64Mi"
    max:
      cpu:    "1"
      memory: "512Mi"
---
# ── ConfigMap: shared app configuration ─────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: canary-demo
  labels:
    app.kubernetes.io/part-of: canary-demo
data:
  APP_ENV:   "production"
  LOG_LEVEL: "info"
  PORT:      "3000"
