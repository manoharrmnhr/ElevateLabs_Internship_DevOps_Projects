---
# ═══════════════════════════════════════════════════════════════
# Deployment — app-stable  (v1.0.0)
# 3 replicas spread across nodes for high availability.
# Envoy sidecar is injected automatically via namespace label.
# ═══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-stable
  namespace: canary-demo
  labels:
    app:     demo-app
    version: v1.0.0
    track:   stable
    app.kubernetes.io/name:      demo-app
    app.kubernetes.io/version:   v1.0.0
    app.kubernetes.io/component: backend
spec:
  replicas: 3
  revisionHistoryLimit: 3              # keep last 3 RS for rollback
  selector:
    matchLabels:
      app:   demo-app
      track: stable
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1                # allow 1 extra pod during update
      maxUnavailable: 0                # zero downtime
  template:
    metadata:
      labels:
        app:     demo-app
        version: v1.0.0
        track:   stable
      annotations:
        # Prometheus scraping
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3000"
        prometheus.io/path:   "/metrics"
        # Force pod restart when configmap changes
        checksum/config: "{{ .ConfigMapResourceVersion }}"
    spec:
      # Spread pods across nodes / zones
      topologySpreadConstraints:
      - maxSkew:           1
        topologyKey:       kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app:   demo-app
            track: stable
      terminationGracePeriodSeconds: 30
      containers:
      - name:  app
        image: demo-app:v1.0.0
        imagePullPolicy: IfNotPresent  # use local image imported into K3s
        ports:
        - name:          http
          containerPort: 3000
          protocol:      TCP
        env:
        - name:  APP_VERSION
          value: "v1.0.0"
        - name:  BUILD_ID
          value: "stable-001"
        - name:  TRACK
          value: "stable"
        - name:  PORT
          value: "3000"
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          requests:
            cpu:    "50m"
            memory: "64Mi"
          limits:
            cpu:    "250m"
            memory: "128Mi"
        # Startup probe: allow up to 30s for cold start
        startupProbe:
          httpGet:
            path: /healthz
            port: 3000
          failureThreshold: 6
          periodSeconds:    5
        # Readiness: pod only receives traffic when truly ready
        readinessProbe:
          httpGet:
            path: /readyz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds:       10
          failureThreshold:    3
          successThreshold:    1
          timeoutSeconds:      2
        # Liveness: restart pod if it becomes deadlocked
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 15
          periodSeconds:       20
          failureThreshold:    3
          timeoutSeconds:      3
        # Graceful shutdown hook
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]
        securityContext:
          runAsNonRoot:             true
          runAsUser:                1001
          readOnlyRootFilesystem:   true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      securityContext:
        fsGroup: 1001
---
# ── HorizontalPodAutoscaler: scale 3→10 on CPU > 60% ───────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-stable-hpa
  namespace: canary-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       app-stable
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type:               Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type:               Utilization
        averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300    # wait 5 min before scaling down
      policies:
      - type:          Pods
        value:         1
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type:          Pods
        value:         2
        periodSeconds: 30
---
# ── PodDisruptionBudget: always keep 2 stable pods running ──────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: app-stable-pdb
  namespace: canary-demo
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app:   demo-app
      track: stable
