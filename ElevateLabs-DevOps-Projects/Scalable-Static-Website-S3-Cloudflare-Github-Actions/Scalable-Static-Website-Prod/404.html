<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | CloudStatic</title>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #f1f5f9;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { text-align: center; padding: 2rem; }
    .code { font-size: 6rem; font-weight: 900; color: #4f46e5; line-height: 1; }
    h1 { font-size: 1.5rem; margin: 0.5rem 0 1rem; }
    p  { color: #94a3b8; margin-bottom: 1.5rem; }
    a  { background: #4f46e5; color: #fff; padding: 0.6rem 1.4rem;
         border-radius: 6px; text-decoration: none; font-weight: 600; }
    a:hover { background: #6366f1; }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you are looking for doesn't exist or has been moved.</p>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
