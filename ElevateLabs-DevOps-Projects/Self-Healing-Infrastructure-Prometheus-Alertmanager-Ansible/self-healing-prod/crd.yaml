apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: servicehealths.selfhealing.company.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: selfhealing.company.io
  names:
    kind: ServiceHealth
    listKind: ServiceHealthList
    plural: servicehealths
    singular: servicehealth
    shortNames:
      - sh
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Target
          type: string
          jsonPath: .spec.targetDeployment
        - name: State
          type: string
          jsonPath: .status.state
        - name: Available
          type: integer
          jsonPath: .status.availableReplicas
        - name: Attempts
          type: integer
          jsonPath: .status.recoveryAttempts
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: ServiceHealth monitors and auto-heals a Kubernetes Deployment
          type: object
          required: [spec]
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [targetDeployment]
              properties:
                targetDeployment:
                  type: string
                  description: Name of the Deployment to monitor
                checkIntervalSeconds:
                  type: integer
                  minimum: 10
                  default: 30
                  description: How often to check health (seconds)
                minAvailablePercent:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 50
                  description: Minimum available replica percentage
                maxRestartCount:
                  type: integer
                  default: 5
                  description: Max pod restarts before recovery
                recoveryStrategy:
                  type: string
                  enum: [RollingRestart, ScaleDown, DeletePod]
                  default: RollingRestart
                maxRecoveryAttempts:
                  type: integer
                  default: 3
                cooldownSeconds:
                  type: integer
                  default: 120
                notificationWebhook:
                  type: string
                healthCheckUrl:
                  type: string
            status:
              type: object
              properties:
                state:
                  type: string
                  enum: [Healthy, Unhealthy, Degraded, Healing, Unknown]
                availableReplicas:
                  type: integer
                lastChecked:
                  type: string
                  format: date-time
                lastHealthyTime:
                  type: string
                  format: date-time
                recoveryAttempts:
                  type: integer
                lastRecoveryTime:
                  type: string
                  format: date-time
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
---
# Example ServiceHealth CR usage
apiVersion: selfhealing.company.io/v1alpha1
kind: ServiceHealth
metadata:
  name: nginx-health-monitor
  namespace: self-healing
spec:
  targetDeployment: nginx
  checkIntervalSeconds: 15
  minAvailablePercent: 67          # At least 2 of 3 replicas must be available
  maxRestartCount: 3
  recoveryStrategy: RollingRestart
  maxRecoveryAttempts: 3
  cooldownSeconds: 120
  healthCheckUrl: "http://nginx.self-healing.svc.cluster.local/health"
  notificationWebhook: "http://webhook-receiver:5001/operator-event"
