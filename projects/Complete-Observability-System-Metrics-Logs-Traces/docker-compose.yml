version: '3.8'

services:
  # ============================================================================
  # APPLICATION SERVICE
  # ============================================================================
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: observability-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    depends_on:
      - jaeger
      - prometheus
    networks:
      - observability
    restart: unless-stopped
    health_check:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ============================================================================
  # PROMETHEUS - METRICS COLLECTION
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: observability-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ============================================================================
  # GRAFANA - DASHBOARDS & VISUALIZATION
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: observability-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ============================================================================
  # LOKI - LOG AGGREGATION
  # ============================================================================
  loki:
    image: grafana/loki:latest
    container_name: observability-loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ============================================================================
  # PROMTAIL - LOG SHIPPER (sends logs to Loki)
  # ============================================================================
  promtail:
    image: grafana/promtail:latest
    container_name: observability-promtail
    volumes:
      - ./config/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - observability
    restart: unless-stopped

  # ============================================================================
  # JAEGER - DISTRIBUTED TRACING
  # ============================================================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: observability-jaeger
    ports:
      - "6831:6831/udp"     # Jaeger agent - thrift compact
      - "6832:6832/udp"     # Jaeger agent - thrift binary
      - "5778:5778"         # Serve frontend
      - "16686:16686"       # Jaeger UI
      - "14268:14268"       # Jaeger collector - HTTP
      - "14250:14250"       # Jaeger collector - gRPC
    environment:
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
      - MEMORY_MAX_TRACES=10000
    volumes:
      - jaeger_data:/badger
    networks:
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:14268/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ============================================================================
  # ALERTMANAGER - ALERT MANAGEMENT (Optional)
  # ============================================================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: observability-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./config/prometheus/alertmanager.yml:/etc/alertmanager/config.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/config.yml"
      - "--storage.path=/alertmanager"
    networks:
      - observability
    restart: unless-stopped

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  jaeger_data:
  alertmanager_data:

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  observability:
    driver: bridge
