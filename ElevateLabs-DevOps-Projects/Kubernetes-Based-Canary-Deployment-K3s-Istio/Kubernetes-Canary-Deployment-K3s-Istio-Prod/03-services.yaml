---
# ═══════════════════════════════════════════════════════════════
# Service — demo-app  (main entry, selects ALL tracks)
# Istio VirtualService overrides the pod selection with weights.
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: canary-demo
  labels:
    app: demo-app
    app.kubernetes.io/name: demo-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb   # NLB hint for cloud
spec:
  type: ClusterIP
  selector:
    app: demo-app                      # selects BOTH stable and canary pods
  ports:
  - name:       http
    port:       80
    targetPort: 3000
    protocol:   TCP
---
# ── Service — demo-app-stable  (stable pods only) ───────────────
# Used for direct health checks and Istio DestinationRule subset
apiVersion: v1
kind: Service
metadata:
  name: demo-app-stable
  namespace: canary-demo
  labels:
    app:   demo-app
    track: stable
spec:
  type: ClusterIP
  selector:
    app:   demo-app
    track: stable
  ports:
  - name:       http
    port:       80
    targetPort: 3000
    protocol:   TCP
---
# ── Service — demo-app-canary  (canary pods only) ───────────────
apiVersion: v1
kind: Service
metadata:
  name: demo-app-canary
  namespace: canary-demo
  labels:
    app:   demo-app
    track: canary
spec:
  type: ClusterIP
  selector:
    app:   demo-app
    track: canary
  ports:
  - name:       http
    port:       80
    targetPort: 3000
    protocol:   TCP
